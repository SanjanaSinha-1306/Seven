<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Seven</title>
    
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    colors: { 
                        pureBlack: '#000000', 
                        neonSky: '#00F0FF', 
                        neonPurple: '#9D4EDD' 
                    } 
                } 
            } 
        }
    </script>
    <style>
        .custom-scroll::-webkit-scrollbar { width: 2px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(157, 78, 221, 0.3); }
        .shadow-sky-glow { box-shadow: 0 0 15px rgba(0, 240, 255, 0.2); }
        
        /* Fused Color Logo Effect */
        .fused-text {
            background: linear-gradient(to bottom right, #00F0FF, #9D4EDD);
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-pureBlack text-slate-100 h-screen w-screen flex overflow-hidden font-sans">

    <div id="splash-screen" class="fixed inset-0 z-[100] bg-pureBlack flex flex-col items-center justify-center transition-all duration-1000">
        <div class="flex flex-col items-center gap-6 animate-pulse">
            <div class="w-24 h-24 rounded-3xl border border-neonSky shadow-sky-glow overflow-hidden">
                <img src="logo.png" onerror="this.src='https://via.placeholder.com/150/00F0FF/000000?text=7'" class="w-full h-full object-cover">
            </div>
            <h1 class="text-5xl tracking-[0.2em] uppercase fused-text">Seven</h1>
        </div>
    </div>

    <aside id="main-sidebar" class="fixed inset-y-0 left-0 z-50 w-72 bg-pureBlack border-r border-white/10 flex flex-col transition-transform duration-300 -translate-x-full md:translate-x-0 md:relative">
        <div class="p-6 pb-2">
            <div class="flex items-center justify-between mb-6">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg border border-neonSky shadow-sky-glow overflow-hidden">
                        <img src="logo.png" onerror="this.src='https://via.placeholder.com/150/00F0FF/000000?text=7'" class="w-full h-full object-cover">
                    </div>
                    <span class="text-sm tracking-widest fused-text">SEVEN</span>
                </div>
                <button onclick="toggleSidebar()" class="md:hidden text-slate-400"><i data-lucide="x"></i></button>
            </div>
            
            <div class="grid grid-cols-2 gap-2 mb-4">
                <button onclick="setPersona('nerd')" id="btn-nerd" class="persona-btn p-2 border border-white/10 rounded-lg text-[10px]">🤓 NERD</button>
                <button onclick="setPersona('smart')" id="btn-smart" class="persona-btn p-2 border border-neonSky bg-white/5 shadow-sky-glow text-neonSky rounded-lg text-[10px]">🧠 GENIUS</button>
                <button onclick="setPersona('romantic')" id="btn-romantic" class="persona-btn p-2 border border-white/10 rounded-lg text-[10px]">🌹 LOVE</button>
                <button onclick="setPersona('sarcastic')" id="btn-sarcastic" class="persona-btn p-2 border border-white/10 rounded-lg text-[10px]">😒 SASSY</button>
                <button onclick="setPersona('gamer')" id="btn-gamer" class="persona-btn p-2 border border-white/10 rounded-lg text-[10px]">🎮 GAMER</button>
                <button onclick="setPersona('mystic')" id="btn-mystic" class="persona-btn p-2 border border-white/10 rounded-lg text-[10px]">🔮 MYSTIC</button>
                <button onclick="setPersona('hype')" id="btn-hype" class="persona-btn p-2 border border-white/10 rounded-lg text-[10px] col-span-2">🔥 HYPE Man</button>
            </div>

            <div class="flex items-center gap-2 bg-white/5 border border-white/10 rounded-xl px-3 py-2.5 mb-4">
                <i data-lucide="search" class="w-3.5 h-3.5 text-slate-500"></i>
                <input type="text" oninput="handleSearch(this.value)" placeholder="Search vibes..." class="bg-transparent text-[11px] outline-none w-full">
            </div>
        </div>

        <div class="px-6 flex items-center justify-between border-t border-white/5 pt-4">
            <span class="text-[9px] font-bold text-slate-500 tracking-widest uppercase">History</span>
            <button onclick="createNewChat()" class="text-neonPurple"><i data-lucide="plus-circle" class="w-5 h-5"></i></button>
        </div>
        <div id="chat-threads-container" class="flex-1 overflow-y-auto p-4 custom-scroll"></div>
    </aside>

    <main id="app-dashboard" class="flex-1 flex flex-col relative h-full bg-pureBlack opacity-0 transition-opacity duration-700">
        <header class="md:hidden p-4 border-b border-white/5 flex items-center justify-between bg-pureBlack/80 backdrop-blur-md z-40">
            <button onclick="toggleSidebar()"><i data-lucide="menu" class="text-neonPurple"></i></button>
            <span class="text-xs tracking-widest uppercase fused-text">Seven</span>
            <div class="w-6"></div>
        </header>

        <div id="chat-messages-viewport" class="flex-1 overflow-y-auto p-4 md:p-10 pb-48 custom-scroll"></div>
        
        <div class="absolute bottom-0 left-0 right-0 p-4 md:p-10 bg-gradient-to-t from-pureBlack via-pureBlack to-transparent">
            <form onsubmit="handleMessageSubmit(event)" class="max-w-3xl mx-auto flex gap-3 bg-white/5 border border-white/10 p-2 rounded-2xl backdrop-blur-3xl shadow-2xl">
                <input type="text" id="chat-message-payload" placeholder="Breathe in... speak out..." autocomplete="off" class="flex-1 bg-transparent px-4 text-sm outline-none text-slate-200">
                <button type="submit" class="bg-gradient-to-r from-neonSky to-neonPurple w-11 h-11 flex items-center justify-center rounded-xl shadow-sky-glow">
                    <i data-lucide="arrow-up" class="w-5 h-5 text-pureBlack"></i>
                </button>
            </form>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
