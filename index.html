<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Seven</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = { 
            theme: { extend: { colors: { pureBlack: '#000000', neonSky: '#00F0FF', neonPurple: '#9D4EDD' } } } 
        }
    </script>
    <style>
        .custom-scroll::-webkit-scrollbar { width: 2px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(157, 78, 221, 0.3); }
        .fused-text {
            background: linear-gradient(to bottom right, #00F0FF, #9D4EDD);
            background-clip: text; -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; font-weight: 900;
        }
        #app-container { height: 100vh; height: -webkit-fill-available; display: flex; flex-direction: row; }
        #main-content { flex: 1; display: flex; flex-direction: column; height: 100%; overflow: hidden; }
    </style>
</head>
<body class="bg-pureBlack text-slate-100 overflow-hidden font-sans">

    <div id="app-container">
        <aside id="main-sidebar" class="fixed inset-y-0 left-0 z-50 w-72 bg-pureBlack border-r border-white/10 flex flex-col transition-transform duration-300 -translate-x-full md:translate-x-0 md:relative">
            <div class="p-6 flex flex-col h-full">
                <div class="flex items-center justify-between mb-6">
                    <span class="text-xl tracking-widest fused-text">SEVEN</span>
                    <button onclick="toggleSidebar()" class="md:hidden text-slate-400"><i data-lucide="x"></i></button>
                </div>
                
                <div class="grid grid-cols-2 gap-2 mb-6">
                    <button onclick="setPersona('nerd')" id="btn-nerd" class="persona-btn p-2 border border-white/10 rounded-lg text-[10px]">🤓 NERD</button>
                    <button onclick="setPersona('smart')" id="btn-smart" class="persona-btn p-2 border border-neonSky text-neonSky rounded-lg text-[10px]">🧠 GENIUS</button>
                    <button onclick="setPersona('romantic')" id="btn-romantic" class="persona-btn p-2 border border-white/10 rounded-lg text-[10px]">❤️ LOVE</button>
                    <button onclick="setPersona('sarcastic')" id="btn-sarcastic" class="persona-btn p-2 border border-white/10 rounded-lg text-[10px]">🙄 SASSY</button>
                    <button onclick="setPersona('gamer')" id="btn-gamer" class="persona-btn p-2 border border-white/10 rounded-lg text-[10px]">🎮 GAMER</button>
                    <button onclick="setPersona('mystic')" id="btn-mystic" class="persona-btn p-2 border border-white/10 rounded-lg text-[10px]">🕉️ MYSTIC</button>
                    <button onclick="setPersona('hype')" id="btn-hype" class="persona-btn p-2 border border-white/10 rounded-lg text-[10px] col-span-2">🔥 HYPE MAN</button>
                </div>

                <button onclick="createNewChat()" class="w-full py-3 bg-white/5 border border-white/10 rounded-xl flex items-center justify-center gap-2 text-sm mb-4">
                    <i data-lucide="plus" class="w-4 h-4"></i> New Vibe
                </button>
                <div id="chat-threads-container" class="flex-1 overflow-y-auto custom-scroll"></div>
            </div>
        </aside>

        <main id="main-content">
            <header class="p-4 border-b border-white/5 flex items-center justify-between md:hidden">
                <button onclick="toggleSidebar()"><i data-lucide="menu" class="text-neonPurple"></i></button>
                <span class="fused-text text-xs">SEVEN</span>
                <div class="w-6"></div>
            </header>

            <div id="chat-messages-viewport" class="flex-1 overflow-y-auto p-4 md:p-10 custom-scroll"></div>

            <div class="p-4 bg-pureBlack border-t border-white/5">
                <form onsubmit="handleMessageSubmit(event)" class="max-w-3xl mx-auto flex gap-3 bg-white/5 border border-white/10 p-2 rounded-2xl">
                    <input type="text" id="chat-message-payload" placeholder="Kuch bolo..." autocomplete="off" class="flex-1 bg-transparent px-4 text-sm outline-none text-slate-200">
                    <button type="submit" class="bg-gradient-to-r from-neonSky to-neonPurple w-11 h-11 flex items-center justify-center rounded-xl">
                        <i data-lucide="arrow-up" class="w-5 h-5 text-pureBlack"></i>
                    </button>
                </form>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
